<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="orb1" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="15%" cy="85%" r="40%">
      <stop offset="0%" stop-color="#7840b0" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#080808" stop-opacity="0"/>
    </radialGradient>
    <!-- Gold gradient for text -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="50%" stop-color="#f0d090"/>
      <stop offset="100%" stop-color="#c9a96e"/>
    </linearGradient>
    <!-- Gold gradient vertical for line -->
    <linearGradient id="goldV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c9a96e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="#080808"/>

  <!-- Grid pattern -->
  <g opacity="0.035" stroke="#c9a96e" stroke-width="1">
    <line x1="0" y1="63" x2="1200" y2="63"/>
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="189" x2="1200" y2="189"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="441" x2="1200" y2="441"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="0" y1="567" x2="1200" y2="567"/>
    <line x1="63" y1="0" x2="63" y2="630"/>
    <line x1="126" y1="0" x2="126" y2="630"/>
    <line x1="189" y1="0" x2="189" y2="630"/>
    <line x1="252" y1="0" x2="252" y2="630"/>
    <line x1="315" y1="0" x2="315" y2="630"/>
    <line x1="378" y1="0" x2="378" y2="630"/>
    <line x1="441" y1="0" x2="441" y2="630"/>
    <line x1="504" y1="0" x2="504" y2="630"/>
    <line x1="567" y1="0" x2="567" y2="630"/>
    <line x1="630" y1="0" x2="630" y2="630"/>
    <line x1="693" y1="0" x2="693" y2="630"/>
    <line x1="756" y1="0" x2="756" y2="630"/>
    <line x1="819" y1="0" x2="819" y2="630"/>
    <line x1="882" y1="0" x2="882" y2="630"/>
    <line x1="945" y1="0" x2="945" y2="630"/>
    <line x1="1008" y1="0" x2="1008" y2="630"/>
    <line x1="1071" y1="0" x2="1071" y2="630"/>
    <line x1="1134" y1="0" x2="1134" y2="630"/>
  </g>

  <!-- Gradient orbs -->
  <rect width="1200" height="630" fill="url(#orb1)"/>
  <rect width="1200" height="630" fill="url(#orb2)"/>

  <!-- Top gold border line -->
  <rect x="0" y="0" width="1200" height="1" fill="url(#gold)" opacity="0.6"/>
  <!-- Bottom gold border line -->
  <rect x="0" y="629" width="1200" height="1" fill="url(#gold)" opacity="0.3"/>

  <!-- Left decorative vertical line -->
  <rect x="80" y="0" width="1" height="630" fill="url(#goldV)" opacity="0.2"/>

  <!-- Top-left corner brackets -->
  <path d="M 48 48 L 48 88" stroke="#c9a96e" stroke-width="1" stroke-opacity="0.5" fill="none"/>
  <path d="M 48 48 L 88 48" stroke="#c9a96e" stroke-width="1" stroke-opacity="0.5" fill="none"/>
  <!-- Bottom-right corner brackets -->
  <path d="M 1152 582 L 1152 542" stroke="#c9a96e" stroke-width="1" stroke-opacity="0.5" fill="none"/>
  <path d="M 1152 582 L 1112 582" stroke="#c9a96e" stroke-width="1" stroke-opacity="0.5" fill="none"/>

  <!-- Badge pill -->
  <rect x="112" y="148" width="280" height="34" rx="17" fill="#c9a96e" fill-opacity="0.1" stroke="#c9a96e" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="133" cy="165" r="4" fill="#c9a96e"/>
  <text x="148" y="170" font-family="Georgia, serif" font-size="12" fill="#e8cc9a" letter-spacing="3" font-weight="600">IA CONSCIENTE · MIAMI</text>

  <!-- Main title SARA VRAI -->
  <text x="112" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="130" font-weight="700" fill="url(#gold)" letter-spacing="-2">SARA VRAI</text>

  <!-- Italic accent line -->
  <text x="114" y="370" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-style="italic" font-weight="400" fill="#888888" letter-spacing="1">Web Agency &amp; IA Consciente</text>

  <!-- Divider line -->
  <rect x="112" y="400" width="60" height="1" fill="#c9a96e" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="112" y="440" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#666666" letter-spacing="0.5" font-weight="400">Desarrollo web custom · E-commerce Shopify · Automatizaciones N8N</text>

  <!-- URL badge bottom right -->
  <rect x="900" y="560" width="220" height="34" rx="17" fill="#0d0d0d" stroke="#c9a96e" stroke-opacity="0.25" stroke-width="1"/>
  <text x="1010" y="582" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#888888" letter-spacing="1" text-anchor="middle">saravrai.com</text>

  <!-- Right side decorative element - vertical text -->
  <text x="1140" y="420" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#333333" letter-spacing="4" text-anchor="middle" transform="rotate(-90 1140 420)">SARA · 2026 · MIAMI</text>
</svg>
